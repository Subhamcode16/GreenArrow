<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="230" fill="#0d1117" stroke="url(#grad)" stroke-width="8" opacity="0.8"/>
  
  <!-- Arrow Path -->
  <path d="M140 256H372M372 256L280 164M372 256L280 348" 
        stroke="url(#grad)" 
        stroke-width="50" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)"/>
        
  <!-- Subtle Orbiting dots for 'Context' feel -->
  <circle cx="256" cy="256" r="190" stroke="url(#grad)" stroke-width="2" stroke-dasharray="10 20" opacity="0.3"/>
</svg>
