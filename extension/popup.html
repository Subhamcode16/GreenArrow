<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            width: 300px;
            padding: 20px;
            background: #0f172a;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 12px;
        }
        .logo {
            width: 24px;
            height: 24px;
        }
        .title {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
        }
        .status-label {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }
        .status-value {
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 8px 12px;
            color: white;
            font-size: 12px;
            outline: none;
        }
        input:focus {
            border-color: #10b981;
        }
        .save-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .save-btn:hover {
            opacity: 0.9;
        }
        .footer {
            text-align: center;
            font-size: 10px;
            color: #64748b;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="logo.svg" class="logo">
            <div class="title">GreenArrow</div>
        </div>

        <div class="status-card">
            <div class="status-label">Bridge Status</div>
            <div class="status-value">
                <div class="status-dot"></div>
                Connected to Relay
            </div>
        </div>

        <div class="input-group">
            <div class="status-label">Pairing Key</div>
            <input type="password" id="apiKey" placeholder="Paste key from VS Code...">
        </div>

        <button class="save-btn" id="saveBtn">Save & Sync</button>

        <div class="footer">v1.0.0 • Stateless AI Handoff</div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
