<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            width: 340px; /* Slightly wider to accommodate code blocks */
            padding: 20px;
            background: #0f172a;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 12px;
        }
        .logo {
            width: 24px;
            height: 24px;
        }
        .title {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* TABS UI */
        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .tab-btn {
            background: transparent;
            color: #94a3b8;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .tab-btn:hover {
            color: white;
            background: rgba(255,255,255,0.05);
        }
        .tab-btn.active {
            color: #10b981;
            background: rgba(16,185,129,0.1);
        }

        /* VIEWS */
        .view { display: none; }
        .view.active { display: flex; flex-direction: column; gap: 16px; }

        /* SNAPSHOT VIEW */
        .snapshot-container {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px;
        }
        .snapshot-textarea {
            width: 100%;
            height: 150px;
            background: transparent;
            border: none;
            color: #e2e8f0;
            font-family: monospace;
            font-size: 11px;
            resize: none;
            outline: none;
            white-space: pre-wrap;
            box-sizing: border-box;
        }
        .snapshot-textarea:empty::before {
            content: "No snapshot generated yet. Bridge context from a chat to see it here.";
            color: #64748b;
        }
        .btn-row {
            display: flex;
            gap: 8px;
        }
        .btn-primary, .btn-secondary {
            flex: 1;
            border: none;
            border-radius: 6px;
            padding: 10px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: opacity 0.2s;
            text-align: center;
        }
        .btn-primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .btn-primary:hover, .btn-secondary:hover { opacity: 0.9; }

        .btn-icon {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-icon:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-1px);
        }

        /* SETTINGS VIEW */
        .status-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
        }
        .status-label {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }
        .status-value {
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 8px 12px;
            color: white;
            font-size: 12px;
            outline: none;
            box-sizing: border-box;
            width: 100%;
        }
        input:focus {
            border-color: #10b981;
        }
        .footer {
            text-align: center;
            font-size: 10px;
            color: #64748b;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="logo.svg" class="logo">
            <div class="title">GreenArrow</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-target="snapshotView">Snapshot</button>
            <button class="tab-btn" data-target="settingsView">Settings</button>
        </div>

        <!-- SNAPSHOT VIEW -->
        <div id="snapshotView" class="view active">
            <div class="snapshot-container">
                <textarea id="snapshotText" class="snapshot-textarea" readonly placeholder="No snapshot generated yet. Bridge context from a chat to see it here."></textarea>
            </div>
            <button id="copyBtn" class="btn-primary">Copy to Clipboard</button>
            
                <button id="openChatGpt" class="btn-icon" title="Open ChatGPT">
                    <svg width="20" height="20" viewBox="0 0 256 260" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M239.184 106.203a64.716 64.716 0 0 0-5.576-53.103C219.452 28.459 191 15.784 163.213 21.74A65.586 65.586 0 0 0 52.096 45.22a64.716 64.716 0 0 0-43.23 31.36c-14.31 24.602-11.061 55.634 8.033 76.74a64.665 64.665 0 0 0 5.525 53.102c14.174 24.65 42.644 37.324 70.446 31.36a64.72 64.72 0 0 0 48.754 21.744c28.481.025 53.714-18.361 62.414-45.481a64.767 64.767 0 0 0 43.229-31.36c14.137-24.558 10.875-55.423-8.083-76.483Zm-97.56 136.338a48.397 48.397 0 0 1-31.105-11.255l1.535-.87 51.67-29.825a8.595 8.595 0 0 0 4.247-7.367v-72.85l21.845 12.636c.218.111.37.32.409.563v60.367c-.056 26.818-21.783 48.545-48.601 48.601Zm-104.466-44.61a48.345 48.345 0 0 1-5.781-32.589l1.534.921 51.722 29.826a8.339 8.339 0 0 0 8.441 0l63.181-36.425v25.221a.87.87 0 0 1-.358.665l-52.335 30.184c-23.257 13.398-52.97 5.431-66.404-17.803ZM23.549 85.38a48.499 48.499 0 0 1 25.58-21.333v61.39a8.288 8.288 0 0 0 4.195 7.316l62.874 36.272-21.845 12.636a.819.819 0 0 1-.767 0L41.353 151.53c-23.211-13.454-31.171-43.144-17.804-66.405v.256Zm179.466 41.695-63.08-36.63L161.73 77.86a.819.819 0 0 1 .768 0l52.233 30.184a48.6 48.6 0 0 1-7.316 87.635v-61.391a8.544 8.544 0 0 0-4.4-7.213Zm21.742-32.69-1.535-.922-51.619-30.081a8.39 8.39 0 0 0-8.492 0L99.98 99.808V74.587a.716.716 0 0 1 .307-.665l52.233-30.133a48.652 48.652 0 0 1 72.236 50.391v.205ZM88.061 139.097l-21.845-12.585a.87.87 0 0 1-.41-.614V65.685a48.652 48.652 0 0 1 79.757-37.346l-1.535.87-51.67 29.825a8.595 8.595 0 0 0-4.246 7.367l-.051 72.697Zm11.868-25.58 28.138-16.217 28.188 16.218v32.434l-28.086 16.218-28.188-16.218-.052-32.434Z"/>
                    </svg>
                </button>
                <button id="openClaude" class="btn-icon" title="Open Claude">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" fill-rule="evenodd" xmlns="http://www.w3.org/2000/svg">
                        <path d="M13.827 3.52h3.603L24 20h-3.603l-6.57-16.48zm-7.258 0h3.767L16.906 20h-3.674l-1.343-3.461H5.017l-1.344 3.46H0L6.57 3.522zm4.132 9.959L8.453 7.687 6.205 13.48H10.7z"></path>
                    </svg>
                </button>
                <button id="openGemini" class="btn-icon" title="Open Gemini">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12.15 24C12.45 17.65 17.65 12.45 24 12.15C17.65 11.85 12.45 6.65 12.15 0.3C11.85 6.65 6.65 11.85 0.3 12.15C6.65 12.45 11.85 17.65 12.15 24Z"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- SETTINGS VIEW -->
        <div id="settingsView" class="view">
            <div class="status-card">
                <div class="status-label">Bridge Status</div>
                <div class="status-value">
                    <div class="status-dot"></div>
                    Connected to Relay
                </div>
            </div>

            <div class="input-group">
                <div class="status-label">Pairing Key</div>
                <input type="password" id="apiKey" placeholder="Paste key from VS Code...">
            </div>

            <button class="btn-primary" id="saveBtn">Save & Sync</button>
        </div>

        <div class="footer">v1.1.0 • Stateless AI Handoff</div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
